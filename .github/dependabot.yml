version: 2
updates:
  # security updates are handled by dependabot security updates within github
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: sunday
    groups:
      minor-patch-updates:
        update-types:
          - "minor"
          - "patch"
      major-updates:
        update-types:
          - "major"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
    groups:
      actions:
        patterns:
          - "*"